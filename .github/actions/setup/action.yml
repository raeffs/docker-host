name: Repository Setup
description: Download the pinned tug release binary, verify its checksum, and put it on PATH

runs:
  using: composite
  steps:
    - name: Install tug
      shell: bash
      run: |
        set -euo pipefail
        TAG=v1.0.0
        ASSET=tug-${TAG}-x86_64-unknown-linux-musl
        BASE=https://github.com/raeffs-dot-dev/tug/releases/download/${TAG}
        cd "$RUNNER_TEMP"
        curl -fSL -o "$ASSET" "$BASE/$ASSET"                 # download the binary
        curl -fSL -o "$ASSET.sha256" "$BASE/$ASSET.sha256"   # download the checksum
        sha256sum -c "$ASSET.sha256"                         # verify (fails the job on mismatch)
        mkdir -p "$HOME/.local/bin"
        install -m 0755 "$ASSET" "$HOME/.local/bin/tug"      # chmod +x + place on PATH
        echo "$HOME/.local/bin" >> "$GITHUB_PATH"
