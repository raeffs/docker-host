name: Homepage Checks

on:
  pull_request:
    branches:
      - '**'
  push:
    branches:
      - main

jobs:
  homepage-healthcheck:
    runs-on: ubuntu-latest

    steps:
      - name: Setup
        uses: ./.github/actions/setup

      - name: Healthcheck
        uses: ./.github/actions/healthcheck
        with:
          app-name: homepage
          compose-file: apps/homepage/docker-compose.yml
