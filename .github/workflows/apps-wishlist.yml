name: Wishlist Checks

on:
  pull_request:
    branches:
      - '**'
  push:
    branches:
      - main

jobs:
  wishlist-healthcheck:
    runs-on: ubuntu-latest

    steps:
      - name: Setup
        uses: ./.github/actions/setup

      - name: Healthcheck
        uses: ./.github/actions/healthcheck
        with:
          app-name: wishlist
          compose-file: apps/wishlist/docker-compose.yml
