name: App Checks

on:
  pull_request:
    branches:
      - '**'
  push:
    branches:
      - main

concurrency:
  group: app-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  healthcheck:
    name: ${{ matrix.app }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        app:
          - baikal
          - bonob
          - dozzle
          - forgejo
          - forgejo-runner
          - gotify
          - homepage
          - keycloak
          - miniflux
          - navidrome
          - ofelia
          - pocket-id
          - redmine
          - seq
          - traefik
          - wallabag
          - watchtower
          - whoami
          - wishlist

    steps:
      - name: Checkout Repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          submodules: true

      - name: Setup
        uses: ./.github/actions/setup

      - name: Healthcheck
        uses: ./.github/actions/healthcheck
        with:
          app-name: ${{ matrix.app }}

  all-checks:
    name: All Checks
    if: always()
    needs: healthcheck
    runs-on: ubuntu-latest

    steps:
      - name: Verify healthcheck result
        if: needs.healthcheck.result != 'success' && needs.healthcheck.result != 'skipped'
        run: exit 1
