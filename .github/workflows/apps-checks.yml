name: App Checks

on:
  pull_request:
    branches:
      - '**'
  push:
    branches:
      - main

concurrency:
  group: app-checks
  cancel-in-progress: false

jobs:
  healthcheck:
    name: ${{ matrix.app }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        app:
          - baikal
          - bonob
          - dozzle
          - forgejo
          - gotify
          - homepage
          - keycloak
          - miniflux
          - navidrome
          - pocket-id
          - seq
          - traefik
          - wallabag
          - watchtower
          - whoami
          - wishlist

    steps:
      - name: Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup
        uses: ./.github/actions/setup

      - name: Healthcheck
        uses: ./.github/actions/healthcheck
        with:
          app-name: ${{ matrix.app }}
          compose-file: apps/${{ matrix.app }}/docker-compose.yml

  all-checks:
    name: All Checks
    if: always()
    needs: healthcheck
    runs-on: ubuntu-latest

    steps:
      - name: Verify healthcheck result
        if: needs.healthcheck.result != 'success' && needs.healthcheck.result != 'skipped'
        run: exit 1
