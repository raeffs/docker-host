name: Pocket ID Checks

on:
  pull_request:
    branches:
      - '**'
  push:
    branches:
      - main

jobs:
  pocket-id-healthcheck:
    runs-on: ubuntu-latest

    steps:
      - name: Setup
        uses: ./.github/actions/setup

      - name: Healthcheck
        uses: ./.github/actions/healthcheck
        with:
          app-name: pocket-id-postgres
          compose-file: apps/pocket-id/pocket-id-postgres/docker-compose.yml
