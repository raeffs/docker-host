name: Miniflux Checks

on:
  pull_request:
    branches:
      - '**'
  push:
    branches:
      - main

jobs:
  miniflux-healthcheck:
    runs-on: ubuntu-latest

    steps:
      - name: Setup
        uses: ./.github/actions/setup

      - name: Healthcheck
        uses: ./.github/actions/healthcheck
        with:
          app-name: miniflux-postgres
          compose-file: apps/miniflux/miniflux-postgres/docker-compose.yml
