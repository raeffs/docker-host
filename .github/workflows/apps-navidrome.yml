name: Navidrome Checks

on:
  pull_request:
    branches:
      - '**'
  push:
    branches:
      - main

jobs:
  navidrome-healthcheck:
    runs-on: ubuntu-latest

    steps:
      - name: Setup
        uses: ./.github/actions/setup

      - name: Healthcheck
        uses: ./.github/actions/healthcheck
        with:
          app-name: navidrome
          compose-file: apps/navidrome/docker-compose.yml
