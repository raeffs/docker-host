name: Forgejo Checks

on:
  pull_request:
    branches:
      - '**'
  push:
    branches:
      - main

jobs:
  forgejo-healthcheck:
    runs-on: ubuntu-latest

    steps:
      - name: Setup
        uses: ./.github/actions/setup

      - name: Healthcheck
        uses: ./.github/actions/healthcheck
        with:
          app-name: forgejo-postgres
          compose-file: apps/forgejo/forgejo-postgres/docker-compose.yml
