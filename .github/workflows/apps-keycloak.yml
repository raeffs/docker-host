name: Keycloak Checks

on:
  pull_request:
    branches:
      - '**'
  push:
    branches:
      - main

jobs:
  keycloak-healthcheck:
    runs-on: ubuntu-latest

    steps:
      - name: Setup
        uses: ./.github/actions/setup

      - name: Healthcheck
        uses: ./.github/actions/healthcheck
        with:
          app-name: keycloak-postgres
          compose-file: apps/keycloak/keycloak-postgres/docker-compose.yml
