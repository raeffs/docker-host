name: Traefik Checks

on:
  pull_request:
    branches:
      - '**'
  push:
    branches:
      - main

jobs:
  traefik-healthcheck:
    runs-on: ubuntu-latest

    steps:
      - name: Setup
        uses: ./.github/actions/setup

      - name: Healthcheck
        uses: ./.github/actions/healthcheck
        with:
          app-name: traefik
          compose-file: apps/traefik/docker-compose.yml
