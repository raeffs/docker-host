services:
  forgejo-runner-dind:
    restart: 'no'

  forgejo-runner:
    restart: 'no'
    # There is no Forgejo instance in CI, so the daemon exits on startup and
    # the wrapper retries forever. Only assert that the retry loop is alive
    # (the wrapper argv contains the daemon invocation).
    healthcheck:
      test: ['CMD', 'pgrep', '-f', 'forgejo-runner daemon']
